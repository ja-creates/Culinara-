<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Culinara | Intelligent Recipe Manager</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Elegant recipe manager for households. Organize culinary traditions and collaborate with family and friends." />
    <meta name="keywords" content="recipes, cooking, kitchen, household, culinary, traditions, food" />
    <meta name="author" content="Culinara Team" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Culinara | Intelligent Recipe Manager" />
    <meta property="og:description" content="Elegant recipe manager for households. Organize culinary traditions and collaborate." />
    <meta property="og:image" content="/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Culinara | Intelligent Recipe Manager" />
    <meta property="twitter:description" content="Elegant recipe manager for households. Organize culinary traditions and collaborate." />

    <!-- Favicon (SVG) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍳</text></svg>">
    <link rel="manifest" href="/site.webmanifest" />

    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f5f5f0;
      }
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
      }
      .loader {
        width: 40px;
        height: 40px;
        border: 3px solid #e7e5e4;
        border-top-color: #1c1917;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @media (prefers-color-scheme: dark) {
        body { background-color: #0c0a09; }
        .loader { border-color: #292524; border-top-color: #fafaf9; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw;">
        <div class="loader"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
